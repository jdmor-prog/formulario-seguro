<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrar Proyecto</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    
    <!-- LADO IZQUIERDO -->
    <section class="hero" aria-label="Intro">
      <!-- Imagen de fondo -->
      <img class="bg-img" src="https://images.pexels.com/photos/8145252/pexels-photo-8145252.jpeg?_gl=1*kfpst4*_ga*ODE4NTU3MDcwLjE3NTIwMjA5NjY.*_ga_8JE65Q40S6*czE3NTY1MDA5NzQkbzIkZzEkdDE3NTY1MDEwMjAkajE0JGwwJGgw" alt="Fondo (reemplazar)">
      
      <article class="hero-inner">
        <section class="hero-card">
          <!-- Logo -->
          <img class="logo" src="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png?rev=40" alt="Logo (reemplazar)">

          <h1>Cuéntanos sobre tu proyecto</h1>
          <p class="subtitle">Transformamos tu idea en software innovador y de alto impacto</p>
          <p class="lead">Una vez enviado, nuestro líder de proyectos recibirá una notificación con tu propuesta para evaluarla y darte una respuesta ágil.</p>
        </section>
      </article>
    </section>

    <!-- LADO DERECHO -->
    <section class="panel-wrap">
      <article class="panel" role="region" aria-labelledby="titulo-form">
        <h2 id="titulo-form">Registrar Proyecto</h2>

        <form action="#" method="post" novalidate>
          <section class="full">
            <label for="nombre">Nombre del proyecto</label>
            <input id="nombre" name="nombre" type="text" placeholder="Nombre del proyecto">
          </section>

          <section>
            <label for="plazo">Plazo estimado (Ej: 3 meses)</label>
            <input id="plazo" name="plazo" type="text" placeholder="Ej: 3 meses">
          </section>

          <section>
            <label for="presupuesto">Presupuesto estimado ($)</label>
            <input id="presupuesto" name="presupuesto" type="number" inputmode="decimal" placeholder="$">
          </section>

          <section class="full">
            <label for="descripcion">Descripción del proyecto</label>
            <textarea id="descripcion" name="descripcion" placeholder="Describe tu idea brevemente..."></textarea>
          </section>

          <section class="full">
            <label>Categoría del proyecto</label>
            <article class="choices" role="group" aria-label="Categoría del proyecto">
              <label class="pill">
                <input type="checkbox" name="cat[]" value="web"> Web
              </label>
              <label class="pill">
                <input type="checkbox" name="cat[]" value="ia"> IA
              </label>
              <label class="pill">
                <input type="checkbox" name="cat[]" value="moviles"> Móviles
              </label>
              <label class="pill">
                <input type="checkbox" name="cat[]" value="escritorio"> Escritorio
              </label>
            </article>
          </section>

          <section>
            <label for="nombre_cli">Su nombre</label>
            <input id="nombre_cli" name="nombre_cli" type="text" placeholder="Tu nombre">
          </section>

          <section>
            <label for="whatsapp">Su Whatsapp</label>
            <input id="whatsapp" name="whatsapp" type="tel" placeholder="Ej: +57 300 000 0000">
          </section>

          <section class="full">
            <label for="correo">Su Correo</label>
            <input id="correo" name="correo" type="email" placeholder="tucorreo@ejemplo.com">
          </section>

          <section class="actions">
            <button class="btn" type="submit">Enviar Proyecto</button>
            <article class="recaptcha" aria-label="reCAPTCHA placeholder">
              <article class="box" aria-hidden="true"></article>
              reCAPTCHA
            </article>
          </section>
        </form>
      </article>
    </section>
  </main>
</body>
</html>
